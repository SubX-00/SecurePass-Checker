<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Checker</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="input-wrapper">
            <input id="input" class="input-field" type="password" placeholder="Enter your Password">
            <button id="toggle" class="toggle-btn">👁️</button>
        </div>
        <div id="strength-bar">
            <div id="strength-fill"></div>
        </div>
        <button id="btn">Login</button>
        <p id="feedback"></p>
    </div>
</body>
</html>
